on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup r2u
        uses: eddelbuettel/github-actions/r2u-setup@master

      - name: Install dependencies
        run: Rscript -e "install.packages(c('xml2', 'stringi', 'jsonlite', 'httr'))"

      - name: Update manifest
        env:
          VSNI_URL: ${{ secrets.VSNI_URL }}
        run: Rscript inst/build_manifest.R

      - name: Create PR if manifest changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update manifest [skip ci]"
          title: "chore: update manifest"
          body: "Automated weekly manifest update."
          branch: "automation/update-manifest"
          delete-branch: true
          add-paths: |
            inst/manifest.json
